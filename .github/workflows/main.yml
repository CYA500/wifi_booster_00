name: Build Nexus Booster APK

on:
  push:
    branches: [ "main" ] # سيبدأ البناء فوراً عند الحفظ
  workflow_dispatch: # يتيح لك بدء البناء يدوياً أيضاً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

     - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true # أضفنا true لكي لا يتوقف إذا لم يجد الملف

      - name: Build with Gradle
        run: gradle assembleDebug # غيرنا ./gradlew إلى gradle فقط

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Booster-App
          path: app/build/outputs/apk/debug/app-debug.apk
